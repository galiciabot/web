<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GalicIABot - Inicio</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden; /* Evita barras de desplazamiento durante la animación */
            font-family: sans-serif;
        }

        #logo-container {
            /* Estado inicial fuera de la pantalla (izquierda) */
            transform: translateX(-150vw);
        }

        #logo {
            width: 80vw;
            max-width: 800px; /* Tamaño bastante grande */
            height: auto;
            cursor: pointer;
            filter: drop-shadow(0 0 30px rgba(255, 255, 255, 0.15));
            /* Suaviza la vuelta a la posición original cuando se quita el ratón */
            transition: transform 0.3s ease-out;
            will-change: transform;
        }

        /* Animación de giro continuo que aplicaremos con JS */
        @keyframes balanceo {
            0% { transform: rotate(0deg); }
            25% { transform: rotate(15deg); }
            50% { transform: rotate(0deg); }
            75% { transform: rotate(-15deg); }
            100% { transform: rotate(0deg); }
        }

        .animacion-giro {
            animation: balanceo 1.2s infinite ease-in-out;
        }
    </style>
</head>
<body>

    <div id="logo-container">
        <img id="logo" src="Logos RECORTADOS/Logo GalicIABot recortado-08.png" alt="Logo GalicIABot">
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const logoContainer = document.getElementById('logo-container');
            const logo = document.getElementById('logo');

            // 1. Efecto de entrada rápida deslizándose desde un lado
            // Usamos RequestAnimationFrame para asegurar que el navegador registre el estado inicial antes de animar
            requestAnimationFrame(() => {
                // Aplicamos la transición
                logoContainer.style.transition = 'transform 0.4s cubic-bezier(0.1, 0.9, 0.2, 1)';
                // Lo movemos a su posición final en el centro
                logoContainer.style.transform = 'translateX(0)';
            });

            // 2. Efecto de movimiento continuo de giro (balanceo) en mouseover
            logo.addEventListener('mouseenter', () => {
                logo.classList.add('animacion-giro');
            });

            logo.addEventListener('mouseleave', () => {
                logo.classList.remove('animacion-giro');
            });
        });
    </script>

</body>
</html>
